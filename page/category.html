---
layout: blog
title : 文章分类
---

<div class="f3">
    {% for category in site.categories %}
    <div class="column fJqueryba">
        <h2 class=""><a href="/page/category.html#{{ category | first }}" class="gray_2">{{ category | first }}</a></h2>
        <ul class="columnUl">
            {% for post in category[1] %}
            <li>
                <b><a href="{{ post.url  }}" class="gray_2">{{ post.title }}</a></b>
				<br />
                <span>{{ post.date | date: "%Y" }}/{{ post.date | date: "%m" }}/{{ post.date | date: "%d" }}</span>
            </li>
            {% endfor %}
        </ul>
    </div>
    {% endfor %}
</div>
<link rel="stylesheet" href="/res/css/min/category.css" type="text/css" media="screen" />
<script src="/res/js/min/jquery.highight.min.js"></script>
<script type="text/javascript">
    $(function(){
        $(".f3").jquerybaHighlight({HighlightClass:"Highlight"});
    });
</script>
